name: kayfit
description: "Kayfit — calorie and nutrition tracker"
publish_to: 'none'
version: 1.0.0+9

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # HTTP (JWT Bearer auth)
  dio: ^5.4.0
  path_provider: ^2.1.0

  # Auth
  sign_in_with_apple: ^6.1.0
  app_links: ^6.1.0

  # Models
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # i18n
  intl: ^0.20.2

  # Media
  image_picker: ^1.1.0
  flutter_image_compress: ^2.3.0
  record: ^6.0.0
  permission_handler: ^11.3.0

  # Barcode scanning
  mobile_scanner: ^6.0.0

  # Storage
  shared_preferences: ^2.2.0

  # URL launcher (Telegram auth)
  url_launcher: ^6.2.0

  # Charts
  fl_chart: ^0.68.0

  # Markdown rendering
  flutter_markdown: ^0.7.0

  # Push notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Analytics
  firebase_analytics: ^11.0.0

  # App Review
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#16A34A"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#16A34A"
  color_dark: "#16A34A"
  android: true
  ios: true
  android_12:
    color: "#16A34A"
    color_dark: "#16A34A"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
